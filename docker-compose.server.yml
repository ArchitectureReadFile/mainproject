# 서버 배포용 overlay compose
# 사용법: docker compose -f docker-compose.yml -f docker-compose.server.yml up -d
#
# 개발용 docker-compose.yml은 그대로 유지됨.
# 이 파일은 서버 전용 설정만 추가/override 한다.
# nginx, cloudflared는 이 파일에서만 정의된다.
# Windows 홈서버 기준 운영 env는 D:/jiyun-env/backend.env 를 사용한다.
#
# [네트워크 구조]
# base compose는 네트워크를 별도 선언하지 않으므로 기본 네트워크(team_default)를 사용한다.
# server overlay에서 모든 서비스를 동일한 app-network로 명시해 서비스명 통신을 보장한다.
# db, redis, qdrant 포함 전 서비스가 app-network에 속한다.
#
# [런타임 볼륨 구조]
# backend_runtime named volume을 backend 계열 전 서비스에 /app/runtime으로 공유한다.
# uploads / exports / cache / celery beat schedule을 한 루트에서 일관되게 관리하기 위함이다.
# 프론트엔드 업스트림 포트: frontend:80 (운영 이미지는 nginx 정적 서빙, 개발용 변경 시 함께 수정 필요)

services:
  # ───────────────────────────────────────────
  # Frontend: production image 사용
  # base compose의 command(npm run dev)가 상속되지 않도록 명시적으로 덮어씀
  # ───────────────────────────────────────────
  frontend:
    image: ${DOCKER_HUB_USER}/jiyun-frontend:latest
    container_name: frontend_container
    restart: unless-stopped
    command: ["nginx", "-g", "daemon off;"]
    volumes: []
    ports: []
    networks:
      - app-network

  # ───────────────────────────────────────────
  # Backend: production command, 외부 env 참조
  # backend_runtime volume을 /app/runtime에 마운트해 worker와 런타임 산출물을 공유
  # ───────────────────────────────────────────
  backend:
    image: ${DOCKER_HUB_USER}/jiyun-backend:latest
    container_name: backend_container
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    env_file: !override
      - D:/jiyun-env/backend.env
    environment: !override
      - TZ=UTC
    restart: unless-stopped
    volumes:
      - backend_runtime:/app/runtime
    ports: []
    networks:
      - app-network

  # ───────────────────────────────────────────
  # Celery workers: 역할별 queue 분리
  # chat      → 병렬 처리
  # document  → 한 번에 1개 (업로드 파일 직접 접근 필수)
  # platform  → 한 번에 1개
  # 모두 backend_runtime volume을 동일 경로(/app/runtime)로 마운트
  # ───────────────────────────────────────────
  chat_worker:
    image: ${DOCKER_HUB_USER}/jiyun-backend:latest
    container_name: chat_worker_container
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q chat_queue
    env_file: !override
      - D:/jiyun-env/backend.env
    environment: !override
      - TZ=UTC
    volumes:
      - backend_runtime:/app/runtime
    networks:
      - app-network

  document_worker:
    image: ${DOCKER_HUB_USER}/jiyun-backend:latest
    container_name: document_worker_container
    command: celery -A celery_app worker --loglevel=info --concurrency=1 -Q document_queue
    env_file: !override
      - D:/jiyun-env/backend.env
    environment: !override
      - TZ=UTC
    volumes:
      - backend_runtime:/app/runtime
    networks:
      - app-network

  platform_worker:
    image: ${DOCKER_HUB_USER}/jiyun-backend:latest
    container_name: platform_worker_container
    command: celery -A celery_app worker --loglevel=info --concurrency=1 -Q platform_queue
    env_file: !override
      - D:/jiyun-env/backend.env
    environment: !override
      - TZ=UTC
    volumes:
      - backend_runtime:/app/runtime
    networks:
      - app-network

  celery_beat:
    image: ${DOCKER_HUB_USER}/jiyun-backend:latest
    container_name: celery_beat_container
    command: celery -A celery_app beat --loglevel=info --schedule runtime/celery/beat-schedule
    env_file: !override
      - D:/jiyun-env/backend.env
    environment: !override
      - TZ=UTC
    volumes:
      - backend_runtime:/app/runtime
    networks:
      - app-network

  # ───────────────────────────────────────────
  # DB / Redis / Qdrant
  # 외부 포트 노출 제거 + app-network 명시
  # ───────────────────────────────────────────
  db:
    ports: []
    networks:
      - app-network

  redis:
    ports: []
    networks:
      - app-network

  qdrant:
    ports: []
    networks:
      - app-network

  # ───────────────────────────────────────────
  # Ollama: 서버에서는 실행하지 않음
  # 서버용 OLLAMA_HOST는 backend.env에서 외부 엔드포인트로 직접 지정
  # ───────────────────────────────────────────
  ollama:
    profiles:
      - dev-only

  # ───────────────────────────────────────────
  # PhpMyAdmin: 서버에서 비활성화
  # ───────────────────────────────────────────
  phpmyadmin:
    profiles:
      - dev-only

  # ───────────────────────────────────────────
  # Nginx: 서버용에서만 실행
  # ───────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_container
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # ───────────────────────────────────────────
  # Cloudflared: 서버용에서만 실행
  # tunnel token은 환경변수로 주입
  # ───────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_container
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend_runtime:
