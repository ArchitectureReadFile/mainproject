worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # 업로드 파일 크기 제한 (법률 문서 PDF 등 고려)
    client_max_body_size 50M;

    # 서버용 frontend: nginx 정적 서빙 (포트 3000)
    # docker-compose.server.yml: image + nginx -g 'daemon off;' 형태
    # 개발용(5173/3000)으로 변경 시 이 값도 함께 변경해야 함
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # ─── /api/ws/ → backend WebSocket ─────────────
        location /api/ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout    3600s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    3600s;
        }

        # ─── /api/ → backend 일반 HTTP ─────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 법률 문서 요약 등 long-running 요청 고려
            # OLLAMA_TIMEOUT_SECONDS=600 에 맞춰 여유 있게 설정
            proxy_read_timeout    660s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    660s;
        }

        # ─── / → frontend (SPA fallback) ───────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA: 404 → index.html fallback
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
