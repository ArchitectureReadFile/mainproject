name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ruff lint
        run: |
          pip install ruff
          cd backend && ruff check .

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint-backend
    env:
      DATABASE_URL: sqlite:///:memory:
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip 업그레이드
        run: python -m pip install --upgrade pip

      - name: 의존성 설치
        run: pip install -r backend/requirements.txt

      - name: pytest 실행
        run: cd backend && python -m pytest

  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: cd frontend && npm ci --legacy-peer-deps

      - name: ESLint
        run: cd frontend && npm run lint

  build-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Vite 빌드 확인
        run: cd frontend && npm run build
