name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: GitHub-hosted runner에서 이미지 빌드 & Docker Hub 푸시
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 이미지 빌드 & 푸시
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Backend 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKER_HUB_USER }}/jiyun-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKER_HUB_USER }}/jiyun-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # Job 2: 집 컴퓨터 self-hosted runner에서 pull & 재배포
  #
  # 운영 env 파일은 repo 밖 D:/jiyun-env/backend.env 에 위치한다.
  # checkout이 ignored 파일을 정리하더라도 영향을 받지 않는다.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 홈서버 배포
    runs-on: [self-hosted, home-server]
    needs: build-and-push

    steps:
      - name: 최신 코드 동기화
        uses: actions/checkout@v4

      - name: 운영 env 파일 존재 확인
        shell: pwsh
        run: |
          if (-not (Test-Path "D:\jiyun-env\backend.env")) {
            Write-Host "❌ D:\jiyun-env\backend.env 가 없습니다. 서버 최초 셋업 문서를 참고하세요."
            exit 1
          }

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 최신 이미지 pull
        shell: pwsh
        env:
          DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.server.yml pull frontend backend

      - name: 서비스 재배포
        env:
          DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        shell: pwsh
        run: |
          docker compose -f docker-compose.yml -f docker-compose.server.yml up -d --remove-orphans

      - name: 미사용 이미지 정리
        shell: pwsh
        run: docker image prune -f
