x-backend-common: &backend-common
  image: python:3.11-slim
  restart: unless-stopped
  working_dir: /app
  volumes:
    - ./backend:/app
    - backend_pip_cache:/root/.cache/pip
  env_file:
    - ./backend/.env
  environment:
    - OLLAMA_HOST=http://ollama:11434
    - REDIS_HOST=redis
    - QDRANT_HOST=qdrant
    - QDRANT_PORT=6333
    - ODL_HYBRID_BACKEND=docling-fast
    - ODL_HYBRID_URL=http://pdf_hybrid:5002
    - ODL_HYBRID_TIMEOUT_MS=300000
    - ODL_OCR_HYBRID_URL=http://pdf_hybrid_ocr:5003
    - ODL_OCR_HYBRID_TIMEOUT_MS=300000
    - TZ=UTC
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started
    qdrant:
      condition: service_started
    pdf_hybrid:
      condition: service_started
    pdf_hybrid_ocr:
      condition: service_started

# NOTE: backend / celery_worker 이미지는 현재 런타임에서 apt-get + pip install을 수행한다.
# cold start 개선을 위한 다음 단계:
#   1. backend/Dockerfile, celery_worker/Dockerfile 작성
#   2. docker-compose build 단계로 의존성 설치를 옮기기
#   3. 본 command는 app 기동만 담당하도록 변경
# 현재는 pip cache 볼륨(backend_pip_cache)으로 재설치 비용을 줄이고 있음.

services:
  frontend:
    image: node:20-alpine
    container_name: frontend_container
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_npm_cache:/root/.npm
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm ci --legacy-peer-deps || npm install --legacy-peer-deps; npm run dev -- --host"

  backend:
    <<: *backend-common
    container_name: backend_container
    ports:
      - "8000:8000"
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends default-jre-headless libgl1 libglib2.0-0 libsm6 libxext6 libxrender1 libxcb1 && rm -rf /var/lib/apt/lists/* && pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  db:
    image: mariadb:10.11
    container_name: mariadb_container
    restart: unless-stopped
    command:
      - --default-time-zone=+00:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      - MARIADB_ROOT_PASSWORD=3141592
      - MARIADB_DATABASE=readfile
      - MARIADB_USER=user
      - MARIADB_PASSWORD=3141592
      - TZ=UTC
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis_container
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant_container
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: phpmyadmin_container
    restart: unless-stopped
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_ARBITRARY=1
      - PMA_ABSOLUTE_URI=http://localhost:5050/
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:0.6.4
    container_name: ollama_container
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - GIN_MODE=release
      - OLLAMA_DEBUG=0
      - OLLAMA_LOG_LEVEL=error
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_CONTEXT_LENGTH=8192
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:3b && wait"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker:
    <<: *backend-common
    container_name: celery_worker_container
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends default-jre-headless libgl1 libglib2.0-0 libsm6 libxext6 libxrender1 libxcb1 && rm -rf /var/lib/apt/lists/* && pip install -r requirements.txt && celery -A celery_app worker --loglevel=info --concurrency=1"

  pdf_hybrid:
    image: python:3.11-slim
    container_name: pdf_hybrid_container
    restart: unless-stopped
    working_dir: /app
    volumes:
      - backend_pip_cache:/root/.cache/pip
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends libgl1 libglib2.0-0 libsm6 libxext6 libxrender1 libxcb1 && rm -rf /var/lib/apt/lists/* && pip install 'opendataloader-pdf[hybrid]==2.0.2' && opendataloader-pdf-hybrid --host 0.0.0.0 --port 5002 --ocr-lang ko,en"

  pdf_hybrid_ocr:
    image: python:3.11-slim
    container_name: pdf_hybrid_ocr_container
    restart: unless-stopped
    working_dir: /app
    volumes:
      - backend_pip_cache:/root/.cache/pip
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends libgl1 libglib2.0-0 libsm6 libxext6 libxrender1 libxcb1 && rm -rf /var/lib/apt/lists/* && pip install 'opendataloader-pdf[hybrid]==2.0.2' && opendataloader-pdf-hybrid --host 0.0.0.0 --port 5003 --force-ocr --ocr-lang ko,en"


volumes:
  ollama_data:
  mariadb_data:
  redis_data:
  qdrant_data:
  frontend_node_modules:
  frontend_npm_cache:
  backend_pip_cache:
